<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OdAIly 信息流设置</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="optionsShell">
    <div class="optionsPage">
      <header class="pageHeader">
        <div>
          <p class="eyebrow">OdAIly</p>
          <h1>信息流插件设置</h1>
        </div>
      </header>
      <form id="optionsForm" class="optionsForm">
        <section class="panel">
          <h2>轮询与声音</h2>
          <label class="field">
            <span>轮询间隔（秒）</span>
            <input id="pollIntervalSeconds" name="pollIntervalSeconds" type="number" min="10" max="120" step="1" />
          </label>
          <label class="field inlineField">
            <span>总开关</span>
            <input id="soundEnabled" name="soundEnabled" type="checkbox" />
          </label>
          <p class="hintText">总开关关闭后，侧边栏不会为任何新消息发声。开启后可继续按消息类型单独配置。</p>
        </section>

        <section class="panel">
          <h2>分类声音配置</h2>
          <div id="soundProfiles" class="soundProfiles"></div>
        </section>

        <div class="formActions">
          <button type="submit" class="primaryButton">保存设置</button>
          <button type="button" id="resetButton" class="secondaryButton">恢复默认</button>
        </div>
        <p class="hintText">Supabase 连接参数已内置在插件中，设置页只保留轮询和声音选项。</p>
        <p id="saveHint" class="hintText"></p>
      </form>
    </div>
    <script type="module" src="./options.js"></script>
  </body>
</html>
